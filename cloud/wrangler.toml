name = "catherines-corner-cloud"
main = "src/index.js"
account_id = "43ba2e655c38cf563c3bcc3772809c42"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET,
# DATABASE_URL, JWT_SECRET) are provided via .dev.vars for `wrangler dev`
# (generated from 1Password at runtime, gitignored) and via `wrangler secret put`
# for production. None are committed.
#
# Phase 0 presigns R2 via the S3 API (aws4fetch), so no R2 binding is needed
# and local `wrangler dev` runs against live R2 + Neon with no Cloudflare login.

[vars]
# Non-secret config. Auth is worker-native magic-link via Resend (founder-
# directed pivot from Neon Auth). SESSION_SECRET / MAGIC_SECRET / RESEND_API_KEY
# are secrets (wrangler secret put in prod, .dev.vars in dev). TEST_MODE is dev-
# only, so production accepts ONLY real session tokens.
APP_URL = "https://nathanaeljyhlee.github.io/catherines-corner/app/"
RESEND_FROM = "Catherine's Corner <noreply@dossier.video>"

[observability]
enabled = true
